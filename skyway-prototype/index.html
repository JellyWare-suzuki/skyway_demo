<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyWayハンズオンサンプル</title>

  <link rel="stylesheet" href="style.css" />

  <!--
    APP_CONFIG: フロントエンドに渡す公開設定値
    ⚠️ accessKey はサーバーの APP_ACCESS_KEY と一致させること。
    ⚠️ これは「第三者が /token を無断利用するのを防ぐ」簡易キーです。
       HTML に含まれるため技術者には見えます。本格運用では認証システムを導入してください。
  -->
  <script>
    window.APP_CONFIG = {
      accessKey: "skyway-demo-2026-safe-key"
    };
  </script>

  <!-- SkyWay Core SDK（ローカルファイル） -->
  <script src="./libs/skyway_core-1.15.2.js"></script>

  <!-- SkyWay Room SDK（ローカルファイル） -->
  <script src="./libs/skyway_room-1.15.2.js"></script>
</head>

<body>
  <h1>SkyWayハンズオンサンプル</h1>

  <div class="grid-container">
    <div id="local" class="item">
      <video id="local-video" autoplay playsinline></video>
      <audio id="local-audio" autoplay muted controls></audio>
      <p class="id-text">ID: <span id="my-id"></span></p>
      <button id="join-button">Room作成/参加</button>
      <input id="room-name" placeholder="Room名" />
      <button id="local-mute-buton" disabled>映像・音声OFF</button>
      <button id="leave-button" disabled>Room閉じる</button>
    </div>

    <div id="remote" class="item">
      <!-- 参加者の映像・音声はここに動的生成される -->
    </div>
  </div>

  <!-- SkyWay SDK をすべて読み込んだ後で script.js を実行 -->
  <script type="module" src="script.js"></script>
</body>
</html>
